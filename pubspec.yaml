name: appplayer
description: "AppPlayer (Standard) — reference product assembling AppPlayer Core with App Mode, Dashboard Mode, and bundle execution."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  appplayer_core: ^0.1.4

  provider: ^6.1.2
  go_router: ^14.6.2
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  dio: ^5.7.0
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
